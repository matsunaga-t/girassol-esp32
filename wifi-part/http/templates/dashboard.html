<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PID Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg:      #0b0c0e;
      --surface: #13151a;
      --card:    #1a1d24;
      --border:  #2a2d36;
      --text:    #e2e4ea;
      --muted:   #5a5e6e;
      --teal:    #1db584;
      --amber:   #f0a020;
      --coral:   #e05560;
      --blue:    #3d8ef0;
      --purple:  #8870e8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; font-size: 13px; padding: 20px; }

    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 14px; font-weight: 500; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; }
    .live-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* cards */
    .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .card-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    .card-value { font-size: 24px; font-weight: 500; line-height: 1; }
    .card-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .c-teal   { color: var(--teal);   }
    .c-amber  { color: var(--amber);  }
    .c-coral  { color: var(--coral);  }
    .c-blue   { color: var(--blue);   }
    .c-purple { color: var(--purple); }

    /* gráficos */
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
    .chart-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .chart-box.wide { grid-column: 1 / -1; }
    .chart-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }

    /* tabela */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; padding: 10px 12px; border-bottom: 1px solid var(--border); font-weight: 400; }
    td { padding: 8px 12px; border-bottom: 1px solid #1e2028; font-family: 'Courier New', monospace; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1e2028; }

    /* mini bar */
    .bar-wrap { width: 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; display: inline-block; vertical-align: middle; margin-right: 6px; }
    .bar-fill  { height: 100%; border-radius: 2px; transition: width .3s; }

    @media (max-width: 600px) {
      .cards  { grid-template-columns: repeat(2, 1fr); }
      .charts { grid-template-columns: 1fr; }
      .charts .wide { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>PID System Dashboard</h1>
  <div class="live-badge"><span class="dot"></span><span id="last-update">aguardando dados...</span></div>
</header>

<!-- Cards de métricas ao vivo -->
<div class="cards">
  <div class="card">
    <div class="card-label">LDR1 (entrada)</div>
    <div class="card-value c-teal" id="c-ldr1">—</div>
    <div class="card-sub" id="c-ldr1m">média: —</div>
  </div>
  <div class="card">
    <div class="card-label">LDR2 (setpoint)</div>
    <div class="card-value c-blue" id="c-ldr2">—</div>
    <div class="card-sub" id="c-ldr2m">média: —</div>
  </div>
  <div class="card">
    <div class="card-label">Erro (setpoint − input)</div>
    <div class="card-value c-amber" id="c-erro">—</div>
    <div class="card-sub">LDR2_mean − LDR1_mean</div>
  </div>
  <div class="card">
    <div class="card-label">Saída PWM</div>
    <div class="card-value c-coral" id="c-pwm">—</div>
    <div class="card-sub" id="c-pid">PID raw: —</div>
  </div>
</div>

<!-- Gráficos -->
<div class="charts">
  <div class="chart-box wide">
    <div class="chart-title">LDRs — bruto vs média móvel</div>
    <canvas id="chart-ldr" height="80"></canvas>
  </div>
  <div class="chart-box">
    <div class="chart-title">Erro do controlador</div>
    <canvas id="chart-erro" height="120"></canvas>
  </div>
  <div class="chart-box">
    <div class="chart-title">Saída PWM (%)</div>
    <canvas id="chart-pwm" height="120"></canvas>
  </div>
</div>

<!-- Tabela histórico -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Horário</th>
        <th>LDR1 bruto</th>
        <th>LDR2 bruto</th>
        <th>Média 1</th>
        <th>Média 2</th>
        <th>Erro</th>
        <th>PWM %</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</div>

<script>
  const GRID   = '#2a2d36';
  const TICK   = '#5a5e6e';
  const CHART_OPTS = {
    animation: false,
    responsive: true,
    plugins: { legend: { display: true, labels: { color: TICK, font: { size: 11, family: "'Courier New', monospace" }, boxWidth: 10, padding: 12 }}},
    scales: {
      x: { ticks: { color: TICK, maxTicksLimit: 8, maxRotation: 0, font: { size: 10 }}, grid: { color: GRID }},
      y: { ticks: { color: TICK, font: { size: 10 }}, grid: { color: GRID }}
    }
  };

  function makeChart(id, datasets, yCallback) {
    const opts = JSON.parse(JSON.stringify(CHART_OPTS));
    if (yCallback) opts.scales.y.ticks.callback = yCallback;
    return new Chart(document.getElementById(id), {
      type: 'line',
      data: { labels: [], datasets },
      options: opts
    });
  }

  const chartLDR = makeChart('chart-ldr', [
    { label: 'LDR1 bruto',  data: [], borderColor: '#1db584', borderWidth: 1,   pointRadius: 0, tension: 0.3, fill: false },
    { label: 'LDR2 bruto',  data: [], borderColor: '#3d8ef0', borderWidth: 1,   pointRadius: 0, tension: 0.3, fill: false },
    { label: 'Média LDR1',  data: [], borderColor: '#1db584', borderWidth: 2,   pointRadius: 0, tension: 0.4, fill: false, borderDash: [4,3] },
    { label: 'Média LDR2',  data: [], borderColor: '#3d8ef0', borderWidth: 2,   pointRadius: 0, tension: 0.4, fill: false, borderDash: [4,3] },
  ], v => v.toFixed(2));

  const chartErro = makeChart('chart-erro', [
    { label: 'Erro', data: [], borderColor: '#f0a020', borderWidth: 1.5, pointRadius: 0, tension: 0.3,
      fill: true, backgroundColor: 'rgba(240,160,32,0.07)' }
  ], v => v.toFixed(3));

  const chartPWM = makeChart('chart-pwm', [
    { label: 'PWM %', data: [], borderColor: '#e05560', borderWidth: 1.5, pointRadius: 0, tension: 0.3,
      fill: true, backgroundColor: 'rgba(224,85,96,0.07)' }
  ], v => v.toFixed(1) + '%');

  function pushData(chart, labels, ...seriesData) {
    chart.data.labels = labels;
    seriesData.forEach((d, i) => chart.data.datasets[i].data = d);
    chart.update('none');
  }

  function fmt(v, d=3) { return (v == null ? '—' : Number(v).toFixed(d)); }
  function pct(v)       { return fmt(v * 100, 1) + '%'; }

  async function atualizar() {
    try {
      const [hist, ult] = await Promise.all([
        fetch('/historico?n=60').then(r => r.json()),
        fetch('/ultimo').then(r => r.json())
      ]);

      // cards ao vivo
      if (ult && ult.timestamp) {
        document.getElementById('c-ldr1').textContent  = pct(ult.ldr1_raw);
        document.getElementById('c-ldr1m').textContent = 'média: ' + pct(ult.ldr1_mean);
        document.getElementById('c-ldr2').textContent  = pct(ult.ldr2_raw);
        document.getElementById('c-ldr2m').textContent = 'média: ' + pct(ult.ldr2_mean);
        document.getElementById('c-erro').textContent  = fmt(ult.erro, 4);
        document.getElementById('c-pwm').textContent   = fmt(ult.pwm_pct, 1) + '%';
        document.getElementById('c-pid').textContent   = 'PID raw: ' + ult.pid_output;
        document.getElementById('last-update').textContent = ult.timestamp.split(' ')[1];
      }

      // gráficos — ordem cronológica
      const dados = [...hist].reverse();
      const labels = dados.map(d => d.timestamp.split(' ')[1]);

      pushData(chartLDR, labels,
        dados.map(d => d.ldr1_raw),
        dados.map(d => d.ldr2_raw),
        dados.map(d => d.ldr1_mean),
        dados.map(d => d.ldr2_mean)
      );
      pushData(chartErro, labels, dados.map(d => d.erro));
      pushData(chartPWM,  labels, dados.map(d => d.pwm_pct));

      // tabela — mais recente primeiro
      document.getElementById('tabela').innerHTML = hist.slice(0, 12).map(d => {
        const erroPct = Math.min(Math.abs(d.erro) * 100, 100);
        const pwmColor = d.pwm_pct > 60 ? '#e05560' : d.pwm_pct > 30 ? '#f0a020' : '#1db584';
        return `<tr>
          <td style="color:var(--muted)">${d.timestamp.split(' ')[1]}</td>
          <td class="c-teal">${pct(d.ldr1_raw)}</td>
          <td class="c-blue">${pct(d.ldr2_raw)}</td>
          <td>${pct(d.ldr1_mean)}</td>
          <td>${pct(d.ldr2_mean)}</td>
          <td><span class="bar-wrap"><span class="bar-fill" style="width:${erroPct.toFixed(0)}%;background:var(--amber)"></span></span>${fmt(d.erro, 4)}</td>
          <td style="color:${pwmColor}">${fmt(d.pwm_pct, 1)}%</td>
        </tr>`;
      }).join('');

    } catch(e) {
      document.getElementById('last-update').textContent = 'sem conexão';
    }
  }

  atualizar();
  setInterval(atualizar, 2000);
</script>
</body>
</html>
